name: YuMatsuyama note daily post

on:
  schedule:
    # Times are UTC. Japan time (JST) = UTC + 9 hours.
    # Off-the-hour minutes + 3 morning attempts to dodge GitHub's busy on-the-hour skips.
    # A "posted today" marker (state/last-post-date.txt) keeps it to ONE post per day.
    - cron: "7 22 * * *"   # 07:07 JST (primary)
    - cron: "37 22 * * *"  # 07:37 JST (backup 1, if the 07:07 run was skipped)
    - cron: "17 23 * * *"  # 08:17 JST (backup 2, last resort)
  workflow_dispatch:

# Never run two posts at once; a queued run will see the marker and skip.
concurrency:
  group: note-daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Needed so a successful run can commit the "posted today" marker back to the repo.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Skip if already posted today (scheduled runs only)
        id: guard
        run: |
          TODAY="$(TZ=Asia/Tokyo date +%F)"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          LAST=""
          if [ -f state/last-post-date.txt ]; then
            LAST="$(tr -d '[:space:]' < state/last-post-date.txt)"
          fi
          echo "Today (JST): $TODAY | Last posted: ${LAST:-none} | Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$LAST" = "$TODAY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already posted today -> this scheduled run will do nothing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Proceeding to generate and post."
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true' && success()
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true' && success()
        run: npm install

      - name: Install Playwright browsers
        if: steps.guard.outputs.skip != 'true' && success()
        run: npx playwright install --with-deps chromium

      - name: Install xvfb (virtual display for headed browser)
        if: steps.guard.outputs.skip != 'true' && success()
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Restore note login state
        if: steps.guard.outputs.skip != 'true' && success()
        env:
          NOTE_STORAGE_STATE_B64: ${{ secrets.NOTE_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$NOTE_STORAGE_STATE_B64" ]; then
            echo "ERROR: NOTE_STORAGE_STATE_B64 is not set in GitHub Secrets"
            exit 1
          fi
          printf '%s' "$NOTE_STORAGE_STATE_B64" | tr -d '\r\n ' | base64 --decode > note-storage-state.json
          node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('note-storage-state.json','utf8')); console.log('note cookies:', s.cookies?.length || 0); if(!s.cookies?.length) process.exit(1)"
          echo "Login state restored."

      - name: Generate article
        if: steps.guard.outputs.skip != 'true' && success()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "ERROR: GEMINI_API_KEY is not set in GitHub Secrets"
            exit 1
          fi
          node scripts/generate-article.mjs

      - name: Post to note
        if: steps.guard.outputs.skip != 'true' && success()
        env:
          NOTE_STORAGE_STATE: note-storage-state.json
          HEADLESS: "false"
        run: xvfb-run -a node scripts/post-note.mjs

      - name: Mark as posted today
        if: steps.guard.outputs.skip != 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          echo "${{ steps.guard.outputs.today }}" > state/last-post-date.txt
          git add state/last-post-date.txt
          if git diff --cached --quiet; then
            echo "Marker already up to date; nothing to commit."
          else
            git commit -m "chore: mark note posted on ${{ steps.guard.outputs.today }}"
            git push origin HEAD:master
          fi

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: note-post-error
          path: work/note-post-error.png
          if-no-files-found: ignore
