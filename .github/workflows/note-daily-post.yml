name: YuMatsuyama note daily post

on:
  schedule:
    # 07:00 Japan time = 22:00 UTC
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install xvfb (virtual display for headed browser)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Restore note login state
        env:
          NOTE_STORAGE_STATE_B64: ${{ secrets.NOTE_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$NOTE_STORAGE_STATE_B64" ]; then
            echo "ERROR: NOTE_STORAGE_STATE_B64 is not set in GitHub Secrets"
            exit 1
          fi
          printf '%s' "$NOTE_STORAGE_STATE_B64" | tr -d '\r\n ' | base64 --decode > note-storage-state.json
          node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('note-storage-state.json','utf8')); console.log('note cookies:', s.cookies?.length || 0); if(!s.cookies?.length) process.exit(1)"
          echo "Login state restored."

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "ERROR: GEMINI_API_KEY is not set in GitHub Secrets"
            exit 1
          fi
          node scripts/generate-article.mjs

      - name: Post to note
        env:
          NOTE_STORAGE_STATE: note-storage-state.json
          HEADLESS: "false"
        run: xvfb-run -a node scripts/post-note.mjs

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: note-post-error
          path: work/note-post-error.png
          if-no-files-found: ignore
