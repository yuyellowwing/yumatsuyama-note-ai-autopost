name: YuMatsuyama note daily post

on:
  schedule:
    # 08:00 Japan time = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore note login state
        env:
          NOTE_STORAGE_STATE_B64: ${{ secrets.NOTE_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$NOTE_STORAGE_STATE_B64" ]; then
            echo "ERROR: NOTE_STORAGE_STATE_B64 is not set in GitHub Secrets"
            exit 1
          fi
          echo "$NOTE_STORAGE_STATE_B64" | base64 -d > note-storage-state.json
          echo "Login state restored."

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "ERROR: OPENAI_API_KEY is not set in GitHub Secrets"
            exit 1
          fi
          node scripts/generate-article.mjs

      - name: Post to note
        env:
          NOTE_STORAGE_STATE: note-storage-state.json
        run: node scripts/post-note.mjs
